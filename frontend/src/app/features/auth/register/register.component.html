<div class="login-container">
  <div class="split-panel">
    <div class="brand-panel">
      <div class="brand-content">
        <h1 class="logo">Skill<span>Sync</span></h1>
        <p class="tagline">Join our global community of learners and mentors.</p>
      </div>
    </div>

    <div class="form-panel">
      <div class="login-box">
        <h2>Create Account</h2>
        <p class="subtitle">Start your journey today</p>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Full Name</mat-label>
            <input matInput formControlName="name" placeholder="Pavan Kumar">
            <mat-error *ngIf="registerForm.get('name')?.hasError('required')">Full Name is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email Address</mat-label>
            <input matInput formControlName="email" type="email" placeholder="rahul.sharma@example.com">
            <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Invalid email address</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput type="password" formControlName="password" placeholder="••••••••••••">
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>I want to be a...</mat-label>
            <mat-select formControlName="role">
              <mat-option value="LEARNER">Learner</mat-option>
              <mat-option value="MENTOR">Mentor</mat-option>
            </mat-select>
          </mat-form-field>

          <div *ngIf="error" class="login-error">
            {{ error }}
          </div>

          <button mat-flat-button color="primary" class="login-btn" type="submit" [disabled]="registerForm.invalid || isLoading">
            <span *ngIf="!isLoading">SIGN UP →</span>
            <span *ngIf="isLoading">CREATING ACCOUNT...</span>
          </button>

          <p class="register-prompt">
            Already have an account? <a routerLink="/auth/login">Sign in</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
